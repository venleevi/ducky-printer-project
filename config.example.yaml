# Ducky Printer Configuration
# Copy to config.yaml and edit as needed.
# All values shown are defaults — omit any line to use the default.

# GPIO pin number (BCM numbering, 2-27)
# Avoid reserved pins: 0-1 (I2C), 14-15 (UART)
gpio_pin: 17

# Trigger mode: "press" (momentary button) or "switch" (toggle switch)
trigger_mode: press

# Minimum seconds between print activations (0 = no cooldown)
cooldown_seconds: 2.0

# Folder containing files to print (.txt, .png, .jpg, .bmp)
source_folder: print_files

# Switch trigger direction: "both", "on_only", or "off_only"
# Only used when trigger_mode is "switch"
# - "both": triggers on both ON and OFF transitions
# - "on_only": triggers only when switch turns ON
# - "off_only": triggers only when switch turns OFF
switch_direction: both

# Printer connection type: "usb" (USB class 7, e.g. Citizen CT-S310II)
# or "serial" (virtual COM port, e.g. PRP-300 on /dev/ttyACM0)
printer_interface: usb

# Serial port device path (only used when printer_interface is "serial")
serial_port: /dev/ttyACM0

# Serial baud rate (only used when printer_interface is "serial")
serial_baudrate: 9600
